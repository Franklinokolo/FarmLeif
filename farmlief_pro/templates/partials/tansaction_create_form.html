<form method="POST"
      hx-post="{% url 'transactions:create_transaction' %}"
      hx-target="#transactionFormContainer"
      hx-swap="innerHTML">

    {% csrf_token %}

    <div class="mb-2">
        <label>Type</label>
        {{ form.transaction_type }}
    </div>

    <div class="mb-2">
        <label>Amount</label>
        {{ form.amount }}
    </div>

    <div class="mb-2">
        <label>Description</label>
        {{ form.description }}
    </div>

    <div class="mb-2">
        <label>Date</label>
        {{ form.date }}
    </div>

    <div class="mb-2">
        <label>Cycle</label>
        {{ form.cycle }}
    </div>

    <div class="mb-2">
        <label>Activity</label>
        {{ form.activity }}
    </div>

    <button class="btn btn-success w-100">
        Save Transaction
    </button>

</form>
