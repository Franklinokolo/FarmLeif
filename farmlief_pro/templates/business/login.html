{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <style>
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a5a01, #87da86);
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 2rem;
            border-radius: 16px;
            background: #fff;
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
            text-align: center;
            transition: 0.3s;
        }

        .login-card:hover {
            transform: translateY(-3px);
        }

        .logo {
            width: 70px;
            margin-bottom: 10px;
        }

        .form-control:focus {
            border-color: #6c8f5e;
            box-shadow: 0 0 0 0.2rem rgba(108, 143, 94, 0.25);
        }

        .toggle-password {
            cursor: pointer;
        }
    </style>
</head>

<body>

<div class="login-card">

    <!-- Logo -->
    <img src="{% static 'images/logo.png' %}" class="logo" alt="Logo">

    <h4 class="mb-3">Welcome Back</h4>

    <!-- Error -->
    {% if error %}
        <div class="alert alert-danger py-2">{{ error }}</div>
    {% endif %}

    <form method="POST" id="loginForm">
        {% csrf_token %}

        <div class="mb-3 text-start">
            <label class="form-label">Username</label>
            <input type="text" name="username" class="form-control" required>
        </div>

        <div class="mb-3 text-start position-relative">
            <label class="form-label">Password</label>

            <input type="password" name="password" id="password" class="form-control pe-5" required>

           
        </div>

        <button type="submit" id="loginBtn" class="btn btn-success w-100">
            Login
        </button>

    </form>

</div>

<script>
  
    // Loading state on submit
    document.getElementById("loginForm").addEventListener("submit", function () {
        const btn = document.getElementById("loginBtn");
        btn.innerHTML = "Logging in...";
        btn.disabled = true;
    });
</script>

</body>
</html>
